name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pagasa
          POSTGRES_USER: pagasa
          POSTGRES_PASSWORD: pagasa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing -m "not requires_db"

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pagasa-backend:${{ github.ref_name }} ./backend

      - name: Build frontend image
        run: docker build -t pagasa-frontend:${{ github.ref_name }} ./frontend

  package-release:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-unit]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archives
        run: |
          git archive --format=zip --output=pagasa-weather-demo-app-${GITHUB_REF_NAME}.zip ${GITHUB_SHA}
          git archive --format=tar.gz --output=pagasa-weather-demo-app-${GITHUB_REF_NAME}.tar.gz ${GITHUB_SHA}

      - name: Extract changelog entry for release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1 }
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            {
              echo "# Release ${GITHUB_REF_NAME}"
              echo
              echo "No matching changelog entry was found for ${GITHUB_REF_NAME}."
              echo "Update CHANGELOG.md to include a section for version ${version}."
            } > release_notes.md
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            pagasa-weather-demo-app-${{ github.ref_name }}.zip
            pagasa-weather-demo-app-${{ github.ref_name }}.tar.gz
            release_notes.md

  create-release:
    runs-on: ubuntu-latest
    needs: [docker-build, package-release]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            pagasa-weather-demo-app-${{ github.ref_name }}.zip
            pagasa-weather-demo-app-${{ github.ref_name }}.tar.gz