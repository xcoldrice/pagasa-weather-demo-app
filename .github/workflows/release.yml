name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pagasa
          POSTGRES_USER: pagasa
          POSTGRES_PASSWORD: pagasa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing -m "not requires_db"

  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Build images using docker-compose
        run: |
          docker compose -f docker-compose.prod-github-release.yml build
          
      - name: Verify images were built
        run: |
          docker images | grep pagasa

  package-release:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-unit]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archives
        run: |
          git archive --format=zip --output=pagasa-weather-demo-app-${GITHUB_REF_NAME}.zip ${GITHUB_SHA}
          git archive --format=tar.gz --output=pagasa-weather-demo-app-${GITHUB_REF_NAME}.tar.gz ${GITHUB_SHA}

      - name: Extract changelog entry for release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1 }
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md

          if [[ ! -s release_notes.md ]]; then
            {
              echo "# Release ${GITHUB_REF_NAME}"
              echo
              echo "No matching changelog entry was found for ${GITHUB_REF_NAME}."
              echo "Update CHANGELOG.md to include a section for version ${version}."
            } > release_notes.md
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            pagasa-weather-demo-app-${{ github.ref_name }}.zip
            pagasa-weather-demo-app-${{ github.ref_name }}.tar.gz
            release_notes.md

  create-release:
    runs-on: ubuntu-latest
    needs: [docker-build, package-release]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            pagasa-weather-demo-app-${{ github.ref_name }}.zip
            pagasa-weather-demo-app-${{ github.ref_name }}.tar.gz

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [create-release]
    environment:
      name: staging
      url: http://server6.gmstdevops.com
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Setup SSH known hosts
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.STAGING_SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST bash << ENDSSH
            set -e
            
            echo "Deploying $TAG_NAME to staging..."
            
            # Check if deployment directory exists and is a git repo
            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "Repository exists, updating..."
              cd $DEPLOY_PATH
              git fetch --tags origin
              git checkout $TAG_NAME
            else
              echo "First time setup - cloning repository..."
              # Create parent directory if needed
              mkdir -p \$(dirname $DEPLOY_PATH)
              
              # Clone the repository
              git clone https://github.com/$GITHUB_REPO.git $DEPLOY_PATH
              cd $DEPLOY_PATH
              
              # Checkout the release tag
              git fetch --tags origin
              git checkout $TAG_NAME
            fi
            
            echo "Current version: \$(git describe --tags)"
            
            # Stop existing containers gracefully
            echo "Stopping existing containers..."
            docker compose -f docker-compose.prod-github-release.yml down
            
            # Build and start containers with the new version
            echo "Building and starting containers..."
            docker compose -f docker-compose.prod-github-release.yml up -d --build
            
            # Wait for services to be ready
            echo "Waiting for services to start..."
            sleep 10
            
            # Check container status
            echo "Container status:"
            docker compose -f docker-compose.prod-github-release.yml ps
            
            echo "Deployment complete!"
          ENDSSH

      - name: Verify deployment health
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.STAGING_SERVER_PASSWORD }}
        run: |
          echo "Verifying deployment health..."
          
          for i in {1..30}; do
            if sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "curl -f http://localhost:8000/health" 2>/dev/null; then
              echo "Backend health check passed!"
              exit 0
            fi
            echo "Waiting for backend to be ready... ($i/30)"
            sleep 10
          done
          
          echo "Deployment health check failed!"
          exit 1

      - name: Rollback on failure
        if: failure()
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.STAGING_SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "Rolling back deployment..."
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST bash << ENDSSH
            if [ -d "$DEPLOY_PATH/.git" ]; then
              cd $DEPLOY_PATH
              
              # Checkout main branch (stable version)
              git checkout main
              git pull origin main
              
              # Restart containers with stable version
              docker compose -f docker-compose.prod-github-release.yml down
              docker compose -f docker-compose.prod-github-release.yml up -d --build
              
              echo "Rollback complete. Running stable version."
            else
              echo "No git repository found, cannot rollback."
            fi
          ENDSSH