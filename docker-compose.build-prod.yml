services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://server6.gmstdevops.com:8000
    container_name: pagasa-frontend
    ports:
      - 80:80
      
  backend:
    build: ./backend
    container_name: pagasa-backend
    volumes:
      - ./backend/data:/app/data
    ports:
      - 8000:8000
    environment:
      APP_VERSION: "1.0.0"
      GIT_SHA: "local"
      POSTGRES_DB: pagasa
      POSTGRES_USER: pagasa
      POSTGRES_PASSWORD: pagasa
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
